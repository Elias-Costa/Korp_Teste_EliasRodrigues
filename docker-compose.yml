services:
  postgres:
    image: postgres:16-alpine
    container_name: korp-postgres
    environment:
      POSTGRES_USER: korp
      POSTGRES_PASSWORD: korp
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init/01-create-databases.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korp -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: korp-inventory-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=korp_inventory;Username=korp;Password=korp
      FailureSimulation__Enabled: "false"
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy

  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    container_name: korp-billing-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=korp_billing;Username=korp;Password=korp
      Services__InventoryServiceBaseUrl: http://inventory-service:8080/
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
      inventory-service:
        condition: service_started

volumes:
  postgres_data:
